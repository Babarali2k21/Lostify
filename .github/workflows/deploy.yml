name: Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: production
        type: choice
        options:
          - production
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "aws/examples/**"

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  test:
    name: Pre-deploy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/item-service:${{ github.workspace }}/notification-service
        run: pytest tests/ -v --tb=short

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to EC2
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude '*.db' \
            --exclude 'aws/dist' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/Lostify/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd ~/Lostify && chmod +x aws/ec2/*.sh && bash aws/ec2/deploy.sh"

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "bash ~/Lostify/aws/ec2/health-check.sh localhost"

      - name: Deployment summary
        run: |
          echo "### Deployed to EC2" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Host:** \`${{ secrets.EC2_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **User Service:** http://${{ secrets.EC2_HOST }}:8001/health" >> $GITHUB_STEP_SUMMARY
          echo "- **Item Service:** http://${{ secrets.EC2_HOST }}:8002/health" >> $GITHUB_STEP_SUMMARY
          echo "- **Notification Service:** http://${{ secrets.EC2_HOST }}:8003/health" >> $GITHUB_STEP_SUMMARY

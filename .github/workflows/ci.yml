name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/item-service:${{ github.workspace }}/claim-recovery-service:${{ github.workspace }}/notification-service
        run: |
          pytest tests/test_events.py tests/test_duplicate_events.py tests/test_saga.py -v --tb=short

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker Compose stack
        run: docker compose up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8001/health && \
            curl -sf http://localhost:8002/health && \
            curl -sf http://localhost:8003/health && exit 0
            sleep 3
          done
          echo "Services failed to start"
          docker compose logs
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/item-service:${{ github.workspace }}/claim-recovery-service:${{ github.workspace }}/notification-service
        run: |
          pytest tests/test_integration.py tests/test_fault_tolerance.py tests/test_event_latency.py -v --tb=short

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose -f docker-compose.prod.yml build

      - name: Verify compose config
        run: docker compose -f docker-compose.prod.yml config --quiet

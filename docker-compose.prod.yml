# Production Docker Compose for EC2 deployment
# Usage: docker compose -f docker-compose.prod.yml up --build -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  item-service:
    build:
      context: .
      dockerfile: item-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-lostify-change-me-in-production}
      DATABASE_URL: sqlite:////data/item.db
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - item-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  claim-recovery-service:
    build:
      context: .
      dockerfile: claim-recovery-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-lostify-change-me-in-production}
      DATABASE_URL: sqlite:////data/claim.db
      REDIS_URL: redis://redis:6379/0
      ITEM_SERVICE_URL: http://item-service:8001
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STEP_FUNCTIONS_STATE_MACHINE_ARN: ${STEP_FUNCTIONS_STATE_MACHINE_ARN:-}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - claim-data:/data
    depends_on:
      redis:
        condition: service_healthy
      item-service:
        condition: service_started
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: sqlite:////data/notification.db
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - notification-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - item-service
      - claim-recovery-service
      - notification-service
    restart: unless-stopped

volumes:
  item-data:
  claim-data:
  notification-data:

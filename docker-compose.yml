services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  user-service:
    build:
      context: ./user-service
    ports:
      - "8001:8001"
    environment:
      JWT_SECRET_KEY: lostify-dev-secret
      DATABASE_URL: sqlite:////data/user.db
      LOG_LEVEL: INFO
    volumes:
      - user-data:/data

  item-service:
    build:
      context: .
      dockerfile: item-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      JWT_SECRET_KEY: lostify-dev-secret
      DATABASE_URL: sqlite:////data/item.db
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    volumes:
      - item-data:/data
    depends_on:
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: sqlite:////data/notification.db
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    volumes:
      - notification-data:/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - user-service
      - item-service
      - notification-service

volumes:
  user-data:
  item-data:
  notification-data:
